# GitLab CI/CD for rookie-web
#
# Flow:
#   git push dev  -> build -> docker image -> deploy development
#   git push real -> build -> docker image -> deploy production
#
# Required GitLab CI/CD variables:
#   DEV_HOST, DEV_USER, DEV_SSH_KEY
#   PROD_HOST, PROD_USER, PROD_SSH_KEY

stages:
  - build
  - docker
  - deploy

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "real"'
    - when: never

variables:
  IMAGE_NAME: '$CI_REGISTRY_IMAGE'
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ''
  PNPM_STORE_PATH: .pnpm-store

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/

build-web:
  stage: build
  image: node:22-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm config set store-dir $PNPM_STORE_PATH
    - node --version
    - pnpm --version
  script:
    - pnpm install --frozen-lockfile
    - pnpm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

build-image:
  stage: docker
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  needs:
    - job: build-web
      artifacts: true
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      case "$CI_COMMIT_BRANCH" in
        dev) IMAGE_TAG="dev" ;;
        real) IMAGE_TAG="real" ;;
        *) echo "Unsupported branch: $CI_COMMIT_BRANCH" && exit 1 ;;
      esac
      docker build -t "$IMAGE_NAME:$IMAGE_TAG" -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" .
      docker push "$IMAGE_NAME:$IMAGE_TAG"
      docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"

deploy-dev:
  stage: deploy
  image: alpine:3.20
  needs:
    - build-image
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - cp "$DEV_SSH_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$DEV_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$DEV_USER@$DEV_HOST" \
        "set -e; \
         docker login -u '$CI_REGISTRY_USER' -p '$CI_REGISTRY_PASSWORD' '$CI_REGISTRY'; \
         docker pull '$IMAGE_NAME:dev'; \
         docker stop rookie-web-dev 2>/dev/null || true; \
         docker rm rookie-web-dev 2>/dev/null || true; \
         docker run -d --name rookie-web-dev -p 3000:80 --restart always '$IMAGE_NAME:dev'"
  environment:
    name: development
    url: http://$DEV_HOST:3000
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

deploy-prod:
  stage: deploy
  image: alpine:3.20
  needs:
    - build-image
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - cp "$PROD_SSH_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$PROD_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$PROD_USER@$PROD_HOST" \
        "set -e; \
         docker login -u '$CI_REGISTRY_USER' -p '$CI_REGISTRY_PASSWORD' '$CI_REGISTRY'; \
         docker pull '$IMAGE_NAME:real'; \
         docker stop rookie-web 2>/dev/null || true; \
         docker rm rookie-web 2>/dev/null || true; \
         docker run -d --name rookie-web -p 80:80 --restart always '$IMAGE_NAME:real'"
  environment:
    name: production
    url: http://$PROD_HOST
  rules:
    - if: '$CI_COMMIT_BRANCH == "real"'