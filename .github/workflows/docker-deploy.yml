name: Docker Deploy

on:
  push:
    branches:
      - main

env:
  SERVER_HOST: your-server-host
  SERVER_USER: root
  GHCR_USERNAME: rookie1232
  CONTAINER_NAME: rookie-web
  CONTAINER_PORT: '80:80'

concurrency:
  group: docker-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm run build

      - name: Prepare image metadata
        id: meta
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE_TAG="${GITHUB_REF_NAME//\//-}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_sha=$IMAGE_NAME:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "image_branch=$IMAGE_NAME:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_branch }}
            ${{ steps.meta.outputs.image_sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ env.GHCR_USERNAME }}" --password-stdin
            docker pull "${{ steps.meta.outputs.image_branch }}"
            docker stop "${{ env.CONTAINER_NAME }}" 2>/dev/null || true
            docker rm "${{ env.CONTAINER_NAME }}" 2>/dev/null || true
            docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              -p "${{ env.CONTAINER_PORT }}" \
              --restart unless-stopped \
              "${{ steps.meta.outputs.image_branch }}"
            docker image prune -f
